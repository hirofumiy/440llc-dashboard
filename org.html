function getAvatar(m) {
  if (m.avatar) return m.avatar;
  return `https://api.dicebear.com/9.x/adventurer/svg?seed=${encodeURIComponent(m.name)}`;
}

function renderOrg(filter) {
  const container = document.getElementById('orgContainer');
  const nav = document.getElementById('deptNav');
  const noResults = document.getElementById('noResults');
  const q = (filter || '').toLowerCase().trim();
  let html = '';
  let navHtml = '';
  let totalShown = 0;

  departments.forEach(dept => {
    const filtered = dept.members.filter(m => {
      if (!q) return true;
      return (m.name + m.reading + m.tantou + dept.name + m.from + m.hobby + m.quote).toLowerCase().includes(q);
    });
    if (filtered.length === 0) return;
    totalShown += filtered.length;
    navHtml += `<a href="#dept-${dept.id}">${dept.name}</a>`;
    html += `<section class="dept-section" id="dept-${dept.id}">
      <div class="dept-header">
        <div class="dept-num">${dept.id}</div>
        <h2>${dept.name}</h2>
        <span class="dept-count">${filtered.length}名</span>
      </div>
      <div class="cards">`;
    filtered.forEach(m => {
      const isBucho = m.role === '部長';
      html += `<div class="card ${isBucho ? 'is-bucho' : ''}" data-name="${m.name}" data-dept="${dept.name}">
        <div class="card-top">
          <img class="avatar" src="${getAvatar(m)}" alt="${m.name}" loading="lazy" onerror="this.src='https://api.dicebear.com/9.x/adventurer/svg?seed=fallback'">
          <div class="card-name">
            <h3>${m.name}</h3>
            <div class="reading">${m.reading}</div>
            <span class="role-badge ${isBucho ? 'role-bucho' : 'role-kacho'}">${m.role}</span>
            <div class="tantou">${m.tantou}</div>
          </div>
        </div>
        <div class="card-body">
          <dl class="profile-grid">
            <dt>生年月日</dt><dd>${m.birth}（${m.age}歳）</dd>
            <dt>出身</dt><dd>${m.from}</dd>
            <dt>身長/体重</dt><dd>${m.height} / ${m.weight}</dd>
            <dt>血液型</dt><dd>${m.blood}型</dd>
            <dt>趣味</dt><dd>${m.hobby}</dd>
          </dl>
          <div class="card-quote">「${m.quote}」</div>
        </div>
      </div>`;
    });
    html += `</div></section>`;
  });

  nav.innerHTML = navHtml;
  container.innerHTML = html;
  noResults.style.display = totalShown === 0 ? 'block' : 'none';
}

document.getElementById('searchInput').addEventListener('input', function() {
  renderOrg(this.value);
});

renderOrg();
</script>
